; Ofelia scheduler configuration (ADR-012).
;
; Runs the follow-up reminder digest from the published Dossier image on a
; schedule, pushing its metrics to the Pushgateway. `dossier track followups`
; only reads the tracker DB and pushes counts — it needs no LLM API key.
;
; EDIT BEFORE DEPLOY:
;   - `volume`: set the host path to your dossier-data checkout on the VPS.
;   - `image`:  set to your GHCR image (ghcr.io/<owner>/dossier:latest).
;   - `schedule`: cron expression or @daily / @every 1h (see Ofelia docs).

[job-run "followups-digest"]
schedule    = @daily
image       = ghcr.io/dimdimlv/dossier:latest
command     = track followups --push-metrics
network     = dossier
pull        = true
delete      = true
volume      = /srv/dossier-data:/data
environment = DOSSIER_DATA_PATH=/data
environment = DOSSIER_PUSHGATEWAY_URL=http://pushgateway:9091
